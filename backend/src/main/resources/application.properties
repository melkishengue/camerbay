spring.application.name=camerbay
server.port=8082

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# HTTP request logging
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# OAuth2 / Zitadel
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:https://sso.afribytes.com}
spring.security.oauth2.resourceserver.opaquetoken.client-id=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_OPAQUETOKEN_CLIENT_ID}
spring.security.oauth2.resourceserver.opaquetoken.client-secret=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_OPAQUETOKEN_CLIENT_SECRET}
spring.security.oauth2.resourceserver.opaquetoken.introspection-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_OPAQUETOKEN_INTROSPECTION_URI:https://sso.afribytes.com/oauth/v2/introspect}

# Google OAuth client IDs — used to validate aud claim in Google idTokens
app.auth.google.ios-client-id=${GOOGLE_IOS_CLIENT_ID}
app.auth.google.android-client-id=${GOOGLE_ANDROID_CLIENT_ID}
app.auth.google.web-client-id=${GOOGLE_WEB_CLIENT_ID}

# App JWT (backend-issued tokens)
app.auth.jwt.secret=${APP_JWT_SECRET}
app.auth.jwt.expiry-seconds=${APP_JWT_EXPIRY_SECONDS:3600}
app.auth.refresh-token.expiry-days=${APP_REFRESH_TOKEN_EXPIRY_DAYS:30}

# Custom properties
app.devMode=${APP_DEVMODE:false}
app.auth.project-id=${APP_AUTH_PROJECT_ID:347966106519994875}
stream.key=${STREAM_KEY}
stream.secret=${STREAM_SECRET}
